name: production-incident-response-simulator
version: 1.0.0
description: A realistic OpenEnv-compatible environment simulating production incident response in a distributed microservices system.

author: 20RITVIK06
license: MIT

tags:
  - devops
  - incident-response
  - distributed-systems
  - reinforcement-learning

# Environment configuration
environment:
  class: ProductionIncidentEnv
  module: env
  
# Server configuration for REST API
server:
  type: flask
  module: api_server
  app: app
  host: 0.0.0.0
  port: 7860

# Observation space definition
observation_space:
  type: dict
  
# Action space definition  
action_space:
  type: discrete
  num_actions: 7
  
# Reward range
reward_range: [-1.0, 2.0]

# Available tasks
tasks:
  - easy
  - medium
  - hard

# Dependencies
dependencies:
  python: ">=3.9"
  packages:
    - pydantic>=2.0.0
    - openai>=1.0.0
    - flask>=3.0.0

# Runtime configuration
runtime:
  python_version: "3.11"
  dockerfile: Dockerfile
  requirements: requirements.txt

# Inference configuration
inference:
  script: inference.py
  entrypoint: run_baseline
  requires_openai_key: true

# Repository information
repository:
  url: https://github.com/20RITVIK06/production_incident_response_system
  branch: main
  
documentation: https://github.com/20RITVIK06/production_incident_response_system/blob/main/README.md
